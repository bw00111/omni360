<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1.0,
    maximum-scale=1.0,
    user-scalable=no
  "
>

<title>Omni360 VR</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,
body{

  width:100%;
  height:100%;

  overflow:hidden;

  background:black;

  font-family:'Inter',sans-serif;

  touch-action:none;
}

/* =========================
   FORCE LANDSCAPE
========================= */

@media screen and (orientation:portrait){

  body::before{

    content:"Rotate Your Phone";

    position:fixed;

    inset:0;

    background:black;

    color:white;

    display:flex;

    justify-content:center;

    align-items:center;

    text-align:center;

    z-index:999999;

    font-size:2rem;

    font-weight:800;

    padding:30px;
  }
}

/* =========================
   LOADING
========================= */

#loadingScreen{

  position:fixed;

  inset:0;

  background:black;

  display:flex;

  justify-content:center;

  align-items:center;

  z-index:9999;

  transition:1s;
}

.loading-text{

  color:white;

  font-size:2.2rem;

  font-weight:800;

  animation:pulse 1.6s infinite;
}

@keyframes pulse{

  0%{
    opacity:0.4;
  }

  50%{
    opacity:1;
  }

  100%{
    opacity:0.4;
  }
}

/* =========================
   ENTER SCREEN
========================= */

#enterScreen{

  position:fixed;

  inset:0;

  background:black;

  display:none;

  justify-content:center;

  align-items:center;

  z-index:9000;

  padding:30px;
}

.enter-box{

  text-align:center;

  color:white;

  max-width:700px;
}

.enter-title{

  font-size:3rem;

  font-weight:800;

  margin-bottom:20px;
}

.enter-sub{

  font-size:1.2rem;

  opacity:0.75;

  line-height:1.7;

  margin-bottom:35px;
}

.enter-btn{

  border:none;

  outline:none;

  background:white;

  color:black;

  padding:20px 55px;

  border-radius:22px;

  font-size:1.2rem;

  font-weight:800;

  font-family:'Inter',sans-serif;
}

/* =========================
   VR
========================= */

#vrContainer{

  position:fixed;

  inset:0;

  display:none;

  background:black;
}

/* FULL SPLIT */

.eye{

  position:absolute;

  top:0;

  width:50%;

  height:100%;

  overflow:hidden;

  background:black;
}

.left-eye{
  left:0;
}

.right-eye{
  right:0;
}

/* VIEW */

.view{

  position:absolute;

  inset:0;

  overflow:hidden;
}

/* HUGE 360 IMAGE */

.panorama{

  position:absolute;

  width:320%;
  height:220%;

  left:-110%;
  top:-60%;

  background-image:url(
    'https://i.ibb.co/wNhchS9Z/thumbnail-56ba41de-ba99-4154-b769-d60fee323f3e-jpg-2048x2048-q85-upscayl-4x-upscayl-lite-4x-2.png'
  );

  background-size:cover;

  background-repeat:no-repeat;

  background-position:center;

  will-change:transform;

  transform-style:preserve-3d;
}

/* CENTER LINE */

.center-line{

  position:fixed;

  top:0;

  left:50%;

  width:2px;

  height:100%;

  background:rgba(255,255,255,0.15);

  z-index:1000;
}

/* CROSSHAIR */

.crosshair{

  position:absolute;

  left:50%;
  top:50%;

  width:18px;
  height:18px;

  border:2px solid white;

  border-radius:50%;

  transform:translate(-50%,-50%);

  z-index:100;
}

.crosshair::before{

  content:"";

  position:absolute;

  width:20px;
  height:2px;

  background:white;

  top:50%;
  left:-10px;

  transform:translateY(-50%);
}

.crosshair::after{

  content:"";

  position:absolute;

  width:2px;
  height:20px;

  background:white;

  left:50%;
  top:-10px;

  transform:translateX(-50%);
}

/* =========================
   FADE
========================= */

.fade-out{
  opacity:0;
}

</style>
</head>

<body>

<!-- LOADING -->

<div id="loadingScreen">

  <div class="loading-text">
    Loading VR
  </div>

</div>

<!-- ENTER -->

<div id="enterScreen">

  <div class="enter-box">

    <div class="enter-title">
      Place Your Phone<br>
      Inside The VR Box
    </div>

    <div class="enter-sub">

      Put it on your head and press
      the button below to enter VR mode.

    </div>

    <button
      class="enter-btn"
      id="enterVrBtn"
    >
      Enter VR
    </button>

  </div>

</div>

<!-- VR -->

<div id="vrContainer">

  <div class="center-line"></div>

  <!-- LEFT -->

  <div class="eye left-eye">

    <div class="view">

      <div
        class="panorama"
        id="leftPano"
      ></div>

    </div>

    <div class="crosshair"></div>

  </div>

  <!-- RIGHT -->

  <div class="eye right-eye">

    <div class="view">

      <div
        class="panorama"
        id="rightPano"
      ></div>

    </div>

    <div class="crosshair"></div>

  </div>

</div>

<script>

/* =========================
   CHECK STORAGE
========================= */

const userData =
localStorage.getItem(
  "omni360UserData"
);

if(!userData){

  window.location.href =
  "index.html";
}

/* =========================
   IMAGE
========================= */

const vrImage =
"https://i.ibb.co/wNhchS9Z/thumbnail-56ba41de-ba99-4154-b769-d60fee323f3e-jpg-2048x2048-q85-upscayl-4x-upscayl-lite-4x-2.png";

/* =========================
   CACHE IMAGE
========================= */

caches.open("omni360-vr-cache")
.then(cache=>{

  cache.add(vrImage);

});

/* =========================
   LOAD
========================= */

const img = new Image();

img.src = vrImage;

img.onload = ()=>{

  setTimeout(()=>{

    const loading =
    document.getElementById(
      "loadingScreen"
    );

    loading.classList.add(
      "fade-out"
    );

    setTimeout(()=>{

      loading.style.display =
      "none";

      startEnterScreen();

    },1000);

  },1200);
};

/* =========================
   ENTER SCREEN
========================= */

function startEnterScreen(){

  document.getElementById(
    "enterScreen"
  ).style.display = "flex";

  document.getElementById(
    "enterVrBtn"
  ).onclick = ()=>{

    enterVR();
  };
}

/* =========================
   ENTER VR
========================= */

function enterVR(){

  const enter =
  document.getElementById(
    "enterScreen"
  );

  enter.classList.add(
    "fade-out"
  );

  setTimeout(()=>{

    enter.style.display =
    "none";

    document.getElementById(
      "vrContainer"
    ).style.display = "block";

    enterFullscreen();

    keepScreenAwake();

    startGyroscope();

  },1000);
}

/* =========================
   PANOS
========================= */

const leftPano =
document.getElementById(
  "leftPano"
);

const rightPano =
document.getElementById(
  "rightPano"
);

/* =========================
   SMOOTHING
========================= */

let smoothYaw = 0;
let smoothPitch = 0;
let smoothRoll = 0;

/* =========================
   GYRO
========================= */

function startGyroscope(){

  if(

    typeof DeviceOrientationEvent
    !== "undefined"

    &&

    typeof DeviceOrientationEvent
    .requestPermission === "function"

  ){

    DeviceOrientationEvent
    .requestPermission()
    .then(permission=>{

      if(permission === "granted"){

        setupOrientation();
      }

    });

  }else{

    setupOrientation();
  }
}

/* =========================
   SENSOR
========================= */

function setupOrientation(){

  window.addEventListener(

    "deviceorientation",

    (event)=>{

      const alpha =
      event.alpha || 0;

      const beta =
      event.beta || 0;

      const gamma =
      event.gamma || 0;

      /* TARGET */

      const targetYaw =
      alpha;

      const targetPitch =
      beta;

      const targetRoll =
      gamma;

      /* SMOOTH */

      smoothYaw +=
      (targetYaw - smoothYaw)
      * 0.05;

      smoothPitch +=
      (targetPitch - smoothPitch)
      * 0.05;

      smoothRoll +=
      (targetRoll - smoothRoll)
      * 0.05;

      renderVR();

    },

    true
  );
}

/* =========================
   RENDER
========================= */

function renderVR(){

  const moveX =
  smoothYaw * -4;

  const moveY =
  smoothPitch * -2;

  const rotate =
  smoothRoll * 0.2;

  const transform = `

    translateX(${moveX}px)

    translateY(${moveY}px)

    rotate(${rotate}deg)

    scale(1.15)

  `;

  leftPano.style.transform =
  transform;

  rightPano.style.transform =
  transform;
}

/* =========================
   LANDSCAPE LOCK
========================= */

async function lockLandscape(){

  try{

    if(

      screen.orientation &&
      screen.orientation.lock

    ){

      await screen.orientation
      .lock("landscape");
    }

  }catch(e){}
}

lockLandscape();

/* =========================
   FULLSCREEN
========================= */

async function enterFullscreen(){

  const el =
  document.documentElement;

  try{

    if(el.requestFullscreen){

      await el.requestFullscreen();

    }else if(
      el.webkitRequestFullscreen
    ){

      await el.webkitRequestFullscreen();

    }else if(
      el.msRequestFullscreen
    ){

      await el.msRequestFullscreen();
    }

  }catch(e){}
}

/* =========================
   WAKE LOCK
========================= */

async function keepScreenAwake(){

  try{

    if("wakeLock" in navigator){

      await navigator.wakeLock.request(
        "screen"
      );
    }

  }catch(e){}
}

</script>

</body>
</html>
