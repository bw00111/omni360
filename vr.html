*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:system-ui,-apple-system,sans-serif;color:#fff;touch-action:none;-webkit-user-select:none;user-select:none}
#start-screen{position:fixed;inset:0;z-index:9999;background:linear-gradient(140deg,#050518,#0a0a3a,#050518);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s}
.goggles{position:relative;width:90px;height:44px;margin-bottom:18px}
.lens{position:absolute;width:36px;height:36px;border:2.5px solid rgba(255,255,255,.2);border-radius:50%;top:4px}
.lens:nth-child(1){left:2px}.lens:nth-child(2){right:2px}
.lens::after{content:'';position:absolute;inset:6px;border:2px solid rgba(255,255,255,.8);border-radius:50%;border-right-color:transparent;animation:sp .9s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.btn-row{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:14px}
.vr-btn{padding:13px 38px;font-size:16px;font-weight:600;border:2px solid rgba(0,180,255,0.6);background:linear-gradient(135deg,rgba(0,100,255,0.3),rgba(100,50,255,0.3));color:#fff;border-radius:14px;cursor:pointer;min-width:230px;text-align:center}
.vr-btn:disabled{opacity:0.3;cursor:not-allowed}
.vr-btn.s{border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.08);font-size:13px;padding:9px 28px}
.st{font-size:11px;opacity:0.4;margin-top:12px;text-align:center;max-width:85%}
.bar-bg{width:170px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-bottom:8px}
.bar-fg{height:100%;width:0;background:linear-gradient(90deg,#00b4ff,#6a30ff);border-radius:2px;transition:width .1s}
.badge{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:600;margin-bottom:10px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);display:inline-block}
#cc{position:fixed;inset:0;z-index:100;display:none;background:#000}
canvas{width:100%;height:100%;display:block}
#wl{position:fixed;inset:0;z-index:99998;background:rgba(0,0,0,0.88);display:none;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
#wl .t{font-size:17px;font-weight:600;opacity:0.9;margin-bottom:5px}
#wl .s2{font-size:11px;opacity:0.3}
#cv{position:fixed;top:0;left:0;width:1px;height:1px;opacity:0.001;z-index:-1}
#ai-iframe{position:fixed;top:0;left:0;width:1px;height:1px;opacity:0.001;z-index:-1;border:none}
</style>
</head>

function tw(pt){if(!pt)return null;if(isXR)return[pt.x,pt.y,pt.z];return[iv2[0]*pt.x+iv2[4]*pt.y+iv2[8]*pt.z+iv2[12],iv2[1]*pt.x+iv2[5]*pt.y+iv2[9]*pt.z+iv2[13],iv2[2]*pt.x+iv2[6]*pt.y+iv2[10]*pt.z+iv2[14]]}
const allVerts=[];const SEGS=4;
HAND_BONES.forEach(([a,b])=>{const ja=j[a],jb=j[b];if(!ja||!jb)return;const wa=tw(ja),wb=tw(jb);if(!wa||!wb)return;allVerts.push(...buildTube(wa,wb,0.008,0.006,SEGS))});
[0,4,8,9,14,19,24].forEach(ji=>{const jt=j[ji];if(!jt)return;const w=tw(jt);if(!w)return;allVerts.push(...buildJointSphere(w[0],w[1],w[2],0.01,3))});
if(allVerts.length===0)return;const data=new Float32Array(allVerts);
gl.useProgram(progM);gl.bindBuffer(gl.ARRAY_BUFFER,meshVBO);gl.bufferData(gl.ARRAY_BUFFER,data,gl.DYNAMIC_DRAW);
gl.enableVertexAttribArray(progM._aP);gl.vertexAttribPointer(progM._aP,3,gl.FLOAT,false,24,0);
gl.enableVertexAttribArray(progM._aN);gl.vertexAttribPointer(progM._aN,3,gl.FLOAT,false,24,12);
gl.uniformMatrix4fv(progM._uM,false,mmul(p,v));gl.uniform4f(progM._uC,0.92,0.92,0.95,0.85);gl.uniform3f(progM._uL,0.5,1.0,0.3);
gl.drawArrays(gl.TRIANGLES,0,data.length/6);
const th=j[4],ix=j[8];
if(th&&ix){const wt=tw(th),wi=tw(ix);if(wt&&wi){
const mx=(wt[0]+wi[0])/2,my=(wt[1]+wi[1])/2,mz=(wt[2]+wi[2])/2;
const dist=Math.sqrt((wt[0]-wi[0])**2+(wt[1]-wi[1])**2+(wt[2]-wi[2])**2);
const isPinch=hd.pinch;gl.useProgram(progH);
gl.bindBuffer(gl.ARRAY_BUFFER,meshVBO);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([mx,my,mz]),gl.DYNAMIC_DRAW);
gl.enableVertexAttribArray(progH._aP);gl.vertexAttribPointer(progH._aP,3,gl.FLOAT,false,0,0);
gl.uniformMatrix4fv(progH._uM,false,mmul(p,v));
const ringSize=isPinch?32:clamp(dist*400,12,30);
gl.uniform1f(progH._uS,ringSize);gl.uniform4f(progH._uC,isPinch?0.15:0.5,isPinch?0.3:0.6,isPinch?0.9:0.8,isPinch?0.9:0.4);gl.drawArrays(gl.POINTS,0,1);
if(isPinch){gl.uniform1f(progH._uS,ringSize+16);gl.uniform4f(progH._uC,0.1,0.2,0.7,0.25);gl.drawArrays(gl.POINTS,0,1);
gl.uniform1f(progH._uS,ringSize+30);gl.uniform4f(progH._uC,0.05,0.1,0.5,0.1);gl.drawArrays(gl.POINTS,0,1)}}}}

function renderScene(p,v){
gl.disable(gl.DEPTH_TEST);drawSph(p,v);gl.enable(gl.DEPTH_TEST);
drawQ2(p,v,[0,2.5,CLOCK_Z],4,1.8,txC);
if(openApp){const ap=getAppPanelPos();const tx=txAppPanels[openApp];if(tx)drawQ2(p,v,ap.pos,ap.w,ap.h,tx)}
else if(setO){drawQ2(p,v,getSP().pos,getSP().w,getSP().h,txSt)}
else{getAP().forEach((a,i)=>{if(txA[i])drawQ2(p,v,a.pos,a.w,a.h,txA[i])})}
gl.disable(gl.DEPTH_TEST);
renderHandMesh(p,v,'left',isImm);renderHandMesh(p,v,'right',isImm);
if(fistPr>.01){buildFist(fistPr);const iv=inv4(v);const ep=[iv[12],iv[13],iv[14]],fw=[-iv[8],-iv[9],-iv[10]],up=[iv[4],iv[5],iv[6]];drawBB(p,v,[ep[0]+fw[0]*1.5+up[0]*-.3,ep[1]+fw[1]*1.5+up[1]*-.3,ep[2]+fw[2]*1.5+up[2]*-.3],.25,.25,txFi)}
if(!handCursorActive){
const iv2=inv4(v),ep=[iv2[12],iv2[13],iv2[14]],fw=[-iv2[8],-iv2[9],-iv2[10]];
const crossSize=gzH?.45:.3;
drawBB(p,v,[ep[0]+fw[0]*5,ep[1]+fw[1]*5,ep[2]+fw[2]*5],crossSize,crossSize,gzH?txG:txX)}
gl.enable(gl.DEPTH_TEST)}

function loadPano(){return new Promise(r=>{const img=new Image();img.crossOrigin='anonymous';const bf=document.getElementById('bf');let fp=0;const fi=setInterval(()=>{fp=Math.min(fp+8,88);bf.style.width=fp+'%'},25);img.onload=()=>{clearInterval(fi);bf.style.width='100%';panoImg=img;r()};img.onerror=()=>{clearInterval(fi);const c=document.createElement('canvas');c.width=2048;c.height=1024;const cx=c.getContext('2d');cx.fillStyle='#0c1e4a';cx.fillRect(0,0,2048,1024);bf.style.width='100%';panoImg=c;r()};img.src=PANO})}
function loadIcons(){appImgs=new Array(APPS.length).fill(null);APPS.forEach((a,i)=>{const img=new Image();img.crossOrigin='anonymous';img.onload=()=>{appImgs[i]=img;if(txR)nAR=true};img.src=a.u})}

function initGL(){
gl.enable(gl.DEPTH_TEST);gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
progP=mkP(VP,FP);progP._aP=gl.getAttribLocation(progP,'aP');progP._aT=gl.getAttribLocation(progP,'aT');progP._uP=gl.getUniformLocation(progP,'uP');progP._uV=gl.getUniformLocation(progP,'uV');progP._uT=gl.getUniformLocation(progP,'uTx');
progU=mkP(VU,FU);progU._aP=gl.getAttribLocation(progU,'aP');progU._aT=gl.getAttribLocation(progU,'aT');progU._uM=gl.getUniformLocation(progU,'uM');progU._uT=gl.getUniformLocation(progU,'uTx');progU._uA=gl.getUniformLocation(progU,'uA');
progH=mkP(VH,FH);progH._aP=gl.getAttribLocation(progH,'aP');progH._uM=gl.getUniformLocation(progH,'uM');progH._uC=gl.getUniformLocation(progH,'uC');progH._uS=gl.getUniformLocation(progH,'uS');
progM=mkP(VM,FM);progM._aP=gl.getAttribLocation(progM,'aP');progM._aN=gl.getAttribLocation(progM,'aN');progM._uM=gl.getUniformLocation(progM,'uM');progM._uC=gl.getUniformLocation(progM,'uC');progM._uL=gl.getUniformLocation(progM,'uL');
buildSph(pCfg.sphD,pCfg.sphD,50);
qVBO=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,qVBO);gl.bufferData(gl.ARRAY_BUFFER,QVD,gl.STATIC_DRAW);
bVBO=gl.createBuffer();meshVBO=gl.createBuffer();
panoTex=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,panoTex);gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,panoImg);sTP(gl.TEXTURE_2D);
_cc=document.createElement('canvas');_cc.width=512;_cc.height=200;_cx=_cc.getContext('2d');
updateCard();buildApps();buildCross();buildGaze(0);buildClose();buildSettings();buildFist(0);txR=true}

function hideStart(){const s=document.getElementById('start-screen');s.style.opacity='0';setTimeout(()=>{s.style.display='none'},400)}
function goFS(){const el=document.documentElement;const r=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen;if(r)r.call(el).catch(()=>{});if(isApple)window.scrollTo(0,1);try{screen.orientation.lock('landscape-primary').catch(()=>{})}catch(e){}}

let xrOK=false;
async function checkXR(){const bg=document.getElementById('badge'),vb=document.getElementById('bv'),cb=document.getElementById('bc'),ib=document.getElementById('bi'),st=document.getElementById('st');
if(isApple){bg.textContent='🍎 Apple';vb.style.display='none';cb.style.display='block';ib.style.display='block';st.textContent='Gyro VR for Cardboard.';return}
if(!navigator.xr){bg.textContent='📱 No WebXR';vb.style.display='none';cb.style.display='block';ib.style.display='block';st.textContent='Gyro fallback.';return}
try{xrOK=await navigator.xr.isSessionSupported('immersive-vr')}catch(e){}
if(xrOK){bg.textContent='🥽 WebXR';vb.disabled=false;vb.textContent='🥽 Enter VR';cb.style.display='block';ib.style.display='block';st.textContent='VR ready!'}
else{bg.textContent='📱';vb.style.display='none';cb.style.display='block';ib.style.display='block';st.textContent='Cardboard mode.'}}

async function startXR(){if(!xrOK)return;try{xrSession=await navigator.xr.requestSession('immersive-vr',{requiredFeatures:['local'],optionalFeatures:['local-floor','hand-tracking']})}catch(e){return}isImm=true;hideStart();document.getElementById('cc').style.display='block';canvas=document.getElementById('glc');gl=canvas.getContext('webgl',{xrCompatible:true,antialias:true,alpha:false,depth:true});if(!gl)return;initGL();
const layer=new XRWebGLLayer(xrSession,gl);await xrSession.updateRenderState({baseLayer:layer});try{xrRefSpace=await xrSession.requestReferenceSpace('local-floor')}catch(e){try{xrRefSpace=await xrSession.requestReferenceSpace('local')}catch(e2){xrRefSpace=await xrSession.requestReferenceSpace('viewer')}}
xrSession.addEventListener('end',()=>{xrSession=null;isImm=false;document.getElementById('start-screen').style.display='flex';document.getElementById('start-screen').style.opacity='1';document.getElementById('cc').style.display='none'});
xrSession.addEventListener('selectstart',()=>{xrP=true});xrSession.addEventListener('selectend',()=>{xrP=false});
pT=performance.now();xrSession.requestAnimationFrame(xrLoop)}

function processXRH(frame,rs,dt){
pClick=false;pRO=null;pRD=null;handCursorActive=false;handCursorPos=null;
if(!xrSession||!frame)return;const SM=pCfg.hSm;
['left','right'].forEach(h=>{const hd=handD[h];hd.prevP=hd.pinch;let hand=null;for(const s of xrSession.inputSources){if(s.hand&&s.handedness===h){hand=s;break}}
if(!hand||!hand.hand){hd.vis=false;hd.fc=lerp(hd.fc,0,.15);hd.pc=lerp(hd.pc,0,.15);hd.pinch=false;hd.isFist=false;return}
hd.vis=true;handCursorActive=true;
for(let j=0;j<25;j++){const js=hand.hand.get(j);if(!js)continue;const po=frame.getJointPose(js,rs);if(!po)continue;const p2=po.transform.position;const pt={x:p2.x,y:p2.y,z:p2.z};if(!hd.sj[j])hd.sj[j]={...pt};else{hd.sj[j].x=lerp(hd.sj[j].x,pt.x,SM);hd.sj[j].y=lerp(hd.sj[j].y,pt.y,SM);hd.sj[j].z=lerp(hd.sj[j].z,pt.z,SM)}}
const th=hd.sj[4],ix=hd.sj[9];if(th&&ix){const pd=v3d(th,ix);const tp=pd<.025?1:pd<.045?1-(pd-.025)/.02:0;hd.pc=lerp(hd.pc,tp,.3);hd.pinch=hd.pc>.6;hd.pp={x:(th.x+ix.x)/2,y:(th.y+ix.y)/2,z:(th.z+ix.z)/2};handCursorPos=hd.pp}
const wr=hd.sj[0];if(wr){let fs=0;[9,14,19,24].forEach((ti,ii)=>{const tp2=hd.sj[ti],mc=hd.sj[[5,10,15,20][ii]];if(tp2&&mc){const d=v3d(tp2,mc);fs+=d<.04?1:d<.06?1-(d-.04)/.02:0}});const tt=hd.sj[4],tm=hd.sj[1];if(tt&&tm){const td=v3d(tt,tm);fs+=td<.04?1:td<.06?1-(td-.04)/.02:0}hd.fc=lerp(hd.fc,fs/5,.2);hd.isFist=hd.fc>.7}hd.itw=hd.sj[9];hd.ww=hd.sj[0]});
['left','right'].forEach(h=>{const hd=handD[h];if(hd.pinch&&!hd.prevP){pClick=true;if(hd.ww&&hd.itw){pRO=[hd.pp.x,hd.pp.y,hd.pp.z];const dx=hd.itw.x-hd.ww.x,dy=hd.itw.y-hd.ww.y,dz=hd.itw.z-hd.ww.z;pRD=v3n(dx,dy,dz)}}});
const af=handD.left.isFist||handD.right.isFist;
if(af){fistTm+=dt;fistPr=Math.min(fistTm/FT,1);if(fistTm>=FT&&!fistAct){fistAct=true;setO=!setO;if(openApp)closeInVRApp();nSR=true;fistTm=0;fistPr=0;fistAct=false}}
else{fistTm=Math.max(0,fistTm-dt*3);fistPr=Math.min(fistTm/FT,1);fistAct=false}}

function xrLoop(time,frame){if(!xrSession)return;xrSession.requestAnimationFrame(xrLoop);const dt=Math.min((time-pT)/1000,.1);pT=time;frc++;
if(time-lTT>pCfg.cardMs){updateCard();lTT=time}if(nAR){buildApps();nAR=false}if(nSR){buildSettings();nSR=false}if(gzH&&frc%3===0)buildGaze(gzP);if(openApp&&frc%pCfg.appFr===0)buildAppPanelTex(openApp);
const pose=frame.getViewerPose(xrRefSpace);if(!pose)return;processXRH(frame,xrRefSpace,dt);const gll=xrSession.renderState.baseLayer;gl.bindFramebuffer(gl.FRAMEBUFFER,gll.framebuffer);gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
let go,gd;const fv=pose.views[0];if(fv.transform){const t=fv.transform;go=[t.position.x,t.position.y,t.position.z];const q=t.orientation;gd=[-2*(q.x*q.z+q.w*q.y),-2*(q.y*q.z-q.w*q.x),-(1-2*(q.x*q.x+q.y*q.y))]}else{go=[0,1.6,0];gd=[0,0,-1]}
for(const s of xrSession.inputSources){if(s.targetRaySpace&&!s.hand){const rp=frame.getPose(s.targetRaySpace,xrRefSpace);if(rp){const rt=rp.transform;go=[rt.position.x,rt.position.y,rt.position.z];const q=rt.orientation;gd=[-2*(q.x*q.z+q.w*q.y),-2*(q.y*q.z-q.w*q.x),-(1-2*(q.x*q.x+q.y*q.y))];break}}}
xrPP=xrP;checkGaze(dt,go,gd);
for(const view of pose.views){const vp=gll.getViewport(view);gl.viewport(vp.x,vp.y,vp.width,vp.height);const pr=new Float32Array(view.projectionMatrix);let vm;if(view.transform?.inverse?.matrix)vm=new Float32Array(view.transform.inverse.matrix);else if(view.transform?.matrix)vm=inv4(new Float32Array(view.transform.matrix));else vm=I();renderScene(pr,vm)}xrPP=xrP}

function startCB(){isCB=true;hideStart();document.getElementById('cc').style.display='block';
document.getElementById('wl').style.display='flex';
document.getElementById('wl').addEventListener('click',()=>{document.getElementById('wl').style.display='none';goFS();initOrientation();initCam();if(navigator.wakeLock)navigator.wakeLock.request('screen').catch(()=>{})},{once:true});
canvas=document.getElementById('glc');canvas.width=innerWidth*devicePixelRatio;canvas.height=innerHeight*devicePixelRatio;
gl=canvas.getContext('webgl',{antialias:true,alpha:false,depth:true,powerPreference:'high-performance'});if(!gl)return;initGL();initTouch();pT=performance.now();requestAnimationFrame(cbLoop)}

function initTouch(){
canvas.addEventListener('touchstart',e=>{if(e.touches.length===1){dragging=true;dsx=e.touches[0].clientX;dsy=e.touches[0].clientY;dy0=tY;dp0=tP}e.preventDefault()},{passive:false});
canvas.addEventListener('touchmove',e=>{if(dragging&&!gyOK&&e.touches.length===1){tY=dy0+(e.touches[0].clientX-dsx)*.004;tP=dp0-(e.touches[0].clientY-dsy)*.004;tP=clamp(tP,-1.4,1.4)}e.preventDefault()},{passive:false});
canvas.addEventListener('touchend',()=>{dragging=false;if(gyOK){xrP=true;setTimeout(()=>{xrP=false},100)}});
canvas.addEventListener('mousedown',e=>{dragging=true;dsx=e.clientX;dsy=e.clientY;dy0=tY;dp0=tP});
window.addEventListener('mousemove',e=>{if(dragging&&!gyOK){tY=dy0+(e.clientX-dsx)*.004;tP=dp0-(e.clientY-dsy)*.004;tP=clamp(tP,-1.4,1.4)}});
window.addEventListener('mouseup',()=>{dragging=false});
window.addEventListener('resize',()=>{if(canvas){canvas.width=innerWidth*devicePixelRatio;canvas.height=innerHeight*devicePixelRatio}})}

function cbLoop(time){
requestAnimationFrame(cbLoop);const dt=Math.min((time-pT)/1000,.1);pT=time;frc++;
if(time-lTT>pCfg.cardMs){updateCard();lTT=time}
if(nAR){buildApps();nAR=false}if(nSR){buildSettings();nSR=false}
if(gzH&&frc%3===0)buildGaze(gzP);if(openApp&&frc%pCfg.appFr===0)buildAppPanelTex(openApp);
updateMPH(dt);const cw=Math.floor(canvas.clientWidth*devicePixelRatio),ch=Math.floor(canvas.clientHeight*devicePixelRatio);
if(canvas.width!==cw||canvas.height!==ch){canvas.width=cw;canvas.height=ch}
let vm;if(gyOK&&useOri)vm=getOriView();else{sP+=(tP-sP)*.3;sY+=(tY-sY)*.3;vm=I();vm=rXM(vm,sP);vm=rYM(vm,sY)}
const iv=inv4(vm),go=[iv[12],iv[13],iv[14]],gd=[-iv[8],-iv[9],-iv[10]];
xrPP=xrP;checkGaze(dt,go,gd);
const fr=vrs.fov*Math.PI/180,ipm=vrs.ipd/1000,hw=Math.floor(canvas.width/2),asp=hw/canvas.height;
const proj=persp(fr,asp,.1,100);
gl.bindFramebuffer(gl.FRAMEBUFFER,null);gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
gl.viewport(0,0,hw,canvas.height);renderScene(proj,mmul(vm,trM(I(),ipm*.5,0,0)));
gl.viewport(hw,0,hw,canvas.height);renderScene(proj,mmul(vm,trM(I(),-ipm*.5,0,0)));
gl.disable(gl.DEPTH_TEST);gl.enable(gl.SCISSOR_TEST);gl.scissor(hw-1,0,2,canvas.height);gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);gl.disable(gl.SCISSOR_TEST);gl.enable(gl.DEPTH_TEST);
xrPP=xrP}
