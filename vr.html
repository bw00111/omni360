<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1.0,
    maximum-scale=1.0,
    user-scalable=no
  "
>

<title>Omni360 A-Frame VR</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- A-Frame Library -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>

/* Basic resets and font */
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background-color: black; /* Ensure background is black while loading */
}

/* Make A-Frame canvas fill the entire screen */
.a-canvas {
  width: 100vw !important;
  height: 100vh !important;
  display: block;
}

/* =========================
   LOADING (Optional: A-Frame has its own built-in loader, but this provides a custom one)
========================= */

#loadingScreen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 1s ease-out;
  pointer-events: all; /* Ensure it blocks interaction */
}

.loading-text {
  color: white;
  font-size: 2.2rem;
  font-weight: 800;
  animation: pulse 1.6s infinite;
}

@keyframes pulse {
  0% { opacity: 0.4; }
  50% { opacity: 1; }
  100% { opacity: 0.4; }
}

#loadingScreen.fade-out {
  opacity: 0;
  pointer-events: none; /* Allow interaction once faded */
}

/* =========================
   A-Frame Overrides / Custom Styling for Enter VR button
   A-Frame inserts a default 'Enter VR' button. We can customize or hide it.
   For this example, we'll let A-Frame's button handle the VR entry,
   but we'll make sure our custom loading screen clears first.
========================= */
.a-enter-vr-button {
    /* Style A-Frame's default button if needed, or hide it if you want to use your own */
    background-color: white !important;
    color: black !important;
    border-radius: 22px !important;
    font-size: 1.2rem !important;
    font-weight: 800 !important;
    padding: 15px 45px !important;
    border: none !important;
    bottom: 20px !important; /* Adjust position */
    left: 50% !important;
    transform: translateX(-50%) !important;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3) !important;
}
.a-enter-vr-button::before {
    content: none !important; /* Remove A-Frame's default VR icon */
}

/* Hide A-Frame's native loader since we have a custom one */
.a-loader-title, .a-loader-spinner {
    display: none !important;
}


</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="loading-text">Loading VR Experience</div>
</div>

<!-- A-Frame Scene -->
<a-scene embedded vr-mode-ui="enabled: true">
  <!-- Sky: The 360-degree panoramic image -->
  <a-sky src="https://i.ibb.co/wNhchS9Z/thumbnail-56ba41de-ba99-4154-b769-d60fee323f3e-jpg-2048x2048-q85-upscayl-4x-upscayl-lite-4x-2.png" rotation="0 -90 0"></a-sky>

  <!-- Camera: This is what the user sees through -->
  <!-- A-Frame automatically provides gyroscope control for the camera -->
  <!-- The `look-controls` component enables this. `wasd-controls` for desktop movement. -->
  <a-entity camera look-controls wasd-controls position="0 1.6 0">
    <!-- Optional: Add a cursor for interaction, though not strictly needed for just viewing -->
    <a-cursor fuse="true" color="#FFF"></a-cursor>
  </a-entity>
</a-scene>

<script>
// Keep screen awake (Wake Lock API)
async function keepScreenAwake(){
  try {
    if("wakeLock" in navigator){
      await navigator.wakeLock.request("screen");
      console.log("Screen wake lock activated.");
    } else {
      console.warn("Wake Lock API not supported.");
    }
  } catch(e) {
    console.error("Error acquiring wake lock:", e);
  }
}

// Fade out custom loading screen once A-Frame is ready
document.addEventListener('DOMContentLoaded', () => {
    const scene = document.querySelector('a-scene');
    const loadingScreen = document.getElementById('loadingScreen');

    if (scene.hasLoaded) {
        // If A-Frame scene is already loaded (e.g., from cache)
        loadingScreen.classList.add('fade-out');
    } else {
        // Wait for A-Frame scene to fully load
        scene.addEventListener('loaded', () => {
            // Give a small delay before fading out to ensure everything is rendered
            setTimeout(() => {
                loadingScreen.classList.add('fade-out');
                // Initiate wake lock after scene is loaded and visible
                keepScreenAwake();
            }, 500); 
        });
    }

    // Optional: Log A-Frame's VR mode changes
    scene.addEventListener('enter-vr', () => {
        console.log('Entered VR mode!');
        // When entering VR, A-Frame handles fullscreen and landscape lock automatically.
    });
    scene.addEventListener('exit-vr', () => {
        console.log('Exited VR mode!');
    });
});
</script>

</body>
</html>
