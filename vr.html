<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1.0,
    maximum-scale=1.0,
    user-scalable=no
  "
>

<title>Omni360 A-Frame VR</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- A-Frame Library -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>

/* Basic resets and font */
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background-color: black; /* Ensure background is black while loading */
}

/* Make A-Frame canvas fill the entire screen */
.a-canvas {
  width: 100vw !important;
  height: 100vh !important;
  display: block;
}

/* =========================
   LOADING (Optional: A-Frame has its own built-in loader, but this provides a custom one)
========================= */

#loadingScreen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10000; /* Increased z-index to ensure it's on top */
  transition: opacity 1s ease-out;
  pointer-events: all; /* Ensure it blocks interaction */
}

.loading-text {
  color: white;
  font-size: 2.2rem;
  font-weight: 800;
  animation: pulse 1.6s infinite;
}

@keyframes pulse {
  0% { opacity: 0.4; }
  50% { opacity: 1; }
  100% { opacity: 0.4; }
}

#loadingScreen.fade-out {
  opacity: 0;
  pointer-events: none; /* Allow interaction once faded */
}

/* =========================
   A-Frame Overrides / Custom Styling for Enter VR button
========================= */
.a-enter-vr-button {
    background-color: white !important;
    color: black !important;
    border-radius: 22px !important;
    font-size: 1.2rem !important;
    font-weight: 800 !important;
    padding: 15px 45px !important;
    border: none !important;
    bottom: 20px !important; /* Adjust position */
    left: 50% !important;
    transform: translateX(-50%) !important;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3) !important;
    z-index: 9999; /* Ensure button is above other elements but below loading screen */
}
.a-enter-vr-button::before {
    content: none !important; /* Remove A-Frame's default VR icon */
}

/* Hide A-Frame's native loader since we have a custom one */
.a-loader-title, .a-loader-spinner {
    display: none !important;
}

</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="loading-text">Loading VR Experience</div>
</div>

<!-- A-Frame Scene -->
<!-- Added background attribute to a-scene for a fallback color -->
<a-scene embedded vr-mode-ui="enabled: true" background="color: #111827">

  <!-- Assets Management: Preload images for better reliability -->
  <a-assets>
    <img id="pano-img" src="https://i.ibb.co/wNhchS9Z/thumbnail-56ba41de-ba99-4154-b769-d60fee323f3e-jpg-2048x2048-q85-upscayl-4x-upscayl-lite-4x-2.png" crossOrigin="anonymous">
    <!-- crossOrigin="anonymous" is crucial if your image is hosted on a different domain
         and you encounter CORS issues, which can prevent it from rendering. -->
  </a-assets>

  <!-- Sky: The 360-degree panoramic image, now referencing the preloaded asset -->
  <!-- Ensure the src references the ID from a-assets, not the direct URL again -->
  <a-sky src="#pano-img" rotation="0 -90 0"></a-sky>

  <!-- Camera: Explicitly define camera properties -->
  <!-- Added active="true" to ensure this is the main camera -->
  <!-- Using wasd-controls-enabled and look-controls-enabled to explicitly control them -->
  <a-entity camera="active: true" 
            look-controls="enabled: true" 
            wasd-controls="enabled: false" 
            position="0 1.6 0">
    <!-- Optional: Add a cursor for interaction, though not strictly needed for just viewing -->
    <a-cursor fuse="true" color="#FFF"></a-cursor>
  </a-entity>
</a-scene>

<script>
// Keep screen awake (Wake Lock API)
async function keepScreenAwake(){
  try {
    if("wakeLock" in navigator){
      const wakeLock = await navigator.wakeLock.request("screen");
      console.log("Screen wake lock activated.");
      wakeLock.addEventListener('release', () => {
        console.log('Wake Lock was released');
      });
    } else {
      console.warn("Wake Lock API not supported.");
    }
  } catch(e) {
    console.error("Error acquiring wake lock:", e);
  }
}

// Fade out custom loading screen once A-Frame is ready
document.addEventListener('DOMContentLoaded', () => {
    const scene = document.querySelector('a-scene');
    const loadingScreen = document.getElementById('loadingScreen');

    const fadeOutLoading = () => {
        loadingScreen.classList.add('fade-out');
        // Initiate wake lock after scene is loaded and visible
        keepScreenAwake();
        console.log("A-Frame scene loaded and custom loading screen faded.");
    };

    if (scene.hasLoaded) {
        // If A-Frame scene is already loaded (e.g., from cache or very fast load)
        console.log("A-Frame scene already loaded (hasLoaded=true).");
        fadeOutLoading();
    } else {
        // Wait for A-Frame scene to fully load all assets
        scene.addEventListener('loaded', () => {
            // Give a small delay before fading out to ensure everything is rendered
            console.log("A-Frame 'loaded' event fired.");
            setTimeout(fadeOutLoading, 500); 
        });

        // Fallback in case 'loaded' event doesn't fire as expected or is delayed
        // This is a safety net; typically, 'loaded' should be reliable.
        setTimeout(() => {
            if (!scene.hasLoaded && !loadingScreen.classList.contains('fade-out')) {
                console.warn("A-Frame 'loaded' event not fired after a delay. Forcing loading screen fade out.");
                fadeOutLoading();
            }
        }, 5000); // 5-second fallback
    }

    // Optional: Log A-Frame's VR mode changes
    scene.addEventListener('enter-vr', () => {
        console.log('Entered VR mode!');
        // When entering VR, A-Frame handles fullscreen and landscape lock automatically.
        // It also requests DeviceOrientation permission if needed.
    });
    scene.addEventListener('exit-vr', () => {
        console.log('Exited VR mode!');
    });
});
</script>

</body>
</html>
