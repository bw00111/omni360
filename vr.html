<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR 360° Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }

        /* ===== ROTATE SCREEN ===== */
        #rotate-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a15 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        #rotate-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .phone-icon {
            width: 80px;
            height: 140px;
            border: 4px solid #fff;
            border-radius: 16px;
            position: relative;
            animation: rotatePhone 2s ease-in-out infinite;
            margin-bottom: 30px;
        }

        .phone-icon::before {
            content: '';
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            border: 3px solid #fff;
            border-radius: 50%;
        }

        .phone-icon::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 4px;
            background: #fff;
            border-radius: 2px;
        }

        @keyframes rotatePhone {
            0%, 30% { transform: rotate(0deg); }
            50%, 80% { transform: rotate(90deg); }
            100% { transform: rotate(0deg); }
        }

        .rotate-text {
            font-size: 22px;
            font-weight: 300;
            text-align: center;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .rotate-subtext {
            font-size: 14px;
            margin-top: 10px;
            opacity: 0.5;
        }

        /* ===== LOADING SCREEN ===== */
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.8s ease;
        }

        #loading-screen.active {
            display: flex;
        }

        #loading-screen.fade-out {
            opacity: 0;
        }

        .vr-goggles {
            width: 120px;
            height: 60px;
            border: 4px solid #fff;
            border-radius: 12px;
            position: relative;
            margin-bottom: 40px;
            animation: float 2s ease-in-out infinite;
        }

        .vr-goggles::before, .vr-goggles::after {
            content: '';
            position: absolute;
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255,255,255,0.8);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
        }

        .vr-goggles::before { left: 14px; }
        .vr-goggles::after { right: 14px; }

        .vr-goggles .bridge {
            position: absolute;
            width: 14px;
            height: 8px;
            border-bottom: 3px solid rgba(255,255,255,0.6);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 0 0 8px 8px;
        }

        .vr-goggles .strap-left, .vr-goggles .strap-right {
            position: absolute;
            width: 20px;
            height: 4px;
            background: rgba(255,255,255,0.5);
            top: 50%;
            transform: translateY(-50%);
        }

        .vr-goggles .strap-left { left: -24px; border-radius: 2px; }
        .vr-goggles .strap-right { right: -24px; border-radius: 2px; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .loading-text {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .loading-bar-container {
            width: 260px;
            height: 6px;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .loading-percent {
            font-size: 16px;
            opacity: 0.6;
            font-variant-numeric: tabular-nums;
        }

        /* ===== VR CANVAS ===== */
        #vr-canvas {
            display: none;
            width: 100%;
            height: 100%;
        }

        #vr-canvas.active {
            display: block;
        }

        /* ===== VR UI OVERLAY ===== */
        #vr-ui {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 15px;
            z-index: 100;
            align-items: center;
        }

        #vr-ui.active {
            display: flex;
        }

        .vr-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            user-select: none;
        }

        .vr-btn:hover, .vr-btn:active {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .vr-btn.enter-vr {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 14px 30px;
            font-size: 16px;
        }

        .vr-btn.enter-vr:hover {
            background: linear-gradient(135deg, #764ba2, #f093fb);
        }

        /* ===== GYRO PERMISSION ===== */
        #gyro-prompt {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }

        #gyro-prompt.active {
            display: flex;
        }

        .gyro-box {
            background: rgba(30,30,50,0.95);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
        }

        .gyro-box h2 {
            margin-bottom: 15px;
            font-weight: 400;
        }

        .gyro-box p {
            opacity: 0.7;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* Desktop hint */
        #desktop-hint {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            opacity: 0.7;
            z-index: 50;
            display: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- ===== ROTATE SCREEN ===== -->
    <div id="rotate-screen">
        <div class="phone-icon"></div>
        <div class="rotate-text">Rotate Your Phone</div>
        <div class="rotate-subtext">Landscape mode required for VR</div>
    </div>

    <!-- ===== LOADING SCREEN ===== -->
    <div id="loading-screen">
        <div class="vr-goggles">
            <div class="bridge"></div>
            <div class="strap-left"></div>
            <div class="strap-right"></div>
        </div>
        <div class="loading-text">Loading VR</div>
        <div class="loading-bar-container">
            <div class="loading-bar" id="loading-bar"></div>
        </div>
        <div class="loading-percent" id="loading-percent">0%</div>
    </div>

    <!-- ===== GYRO PERMISSION ===== -->
    <div id="gyro-prompt">
        <div class="gyro-box">
            <h2>🔄 Motion Sensors</h2>
            <p>Allow access to your device's motion sensors for the full VR experience with head tracking.</p>
            <button class="vr-btn enter-vr" id="gyro-allow-btn">Enable Motion</button>
            <br><br>
            <button class="vr-btn" id="gyro-skip-btn">Skip (Use Touch)</button>
        </div>
    </div>

    <!-- ===== VR CANVAS ===== -->
    <canvas id="vr-canvas"></canvas>

    <!-- ===== VR UI ===== -->
    <div id="vr-ui">
        <button class="vr-btn" id="stereo-btn">👓 Stereo VR</button>
        <button class="vr-btn enter-vr" id="enter-vr-btn" style="display:none;">🥽 Enter WebXR</button>
        <button class="vr-btn" id="fullscreen-btn">⛶ Fullscreen</button>
    </div>

    <div id="desktop-hint">Click and drag to look around</div>

    <script>
        // ===== CONFIG =====
        const IMAGE_URL = 'https://i.ibb.co/wNhchS9Z/thumbnail-56ba41de-ba99-4154-b769-d60fee323f3e-jpg-2048x2048-q85-upscayl-4x-upscayl-lite-4x-2.png';
        const CACHE_NAME = 'vr-360-cache-v1';

        // ===== ELEMENTS =====
        const rotateScreen = document.getElementById('rotate-screen');
        const loadingScreen = document.getElementById('loading-screen');
        const loadingBar = document.getElementById('loading-bar');
        const loadingPercent = document.getElementById('loading-percent');
        const vrCanvas = document.getElementById('vr-canvas');
        const vrUI = document.getElementById('vr-ui');
        const stereoBtn = document.getElementById('stereo-btn');
        const enterVRBtn = document.getElementById('enter-vr-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const gyroPrompt = document.getElementById('gyro-prompt');
        const gyroAllowBtn = document.getElementById('gyro-allow-btn');
        const gyroSkipBtn = document.getElementById('gyro-skip-btn');
        const desktopHint = document.getElementById('desktop-hint');

        // ===== STATE =====
        let gl, texture, shaderProgram;
        let isStereo = false;
        let isVRSession = false;
        let xrSession = null;
        let xrRefSpace = null;
        let imageLoaded = false;
        let gyroEnabled = false;

        // Camera
        let camYaw = 0, camPitch = 0;
        let targetYaw = 0, targetPitch = 0;

        // Touch/Mouse
        let isDragging = false;
        let lastX = 0, lastY = 0;

        // Gyroscope
        let gyroAlpha = 0, gyroBeta = 0, gyroGamma = 0;
        let useGyro = false;

        // Device detection
        const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

        // ===== 1. ORIENTATION CHECK =====
        function checkOrientation() {
            if (!isMobile) {
                // Desktop: skip rotation screen
                rotateScreen.classList.add('hidden');
                setTimeout(() => {
                    rotateScreen.style.display = 'none';
                    desktopHint.style.display = 'block';
                    startLoading();
                }, 500);
                return;
            }

            const isLandscape = window.innerWidth > window.innerHeight;
            if (isLandscape) {
                rotateScreen.classList.add('hidden');
                setTimeout(() => {
                    rotateScreen.style.display = 'none';
                    startLoading();
                }, 500);
            }
        }

        window.addEventListener('resize', () => {
            if (!isMobile) return;
            const isLandscape = window.innerWidth > window.innerHeight;
            if (isLandscape && rotateScreen.style.display !== 'none') {
                rotateScreen.classList.add('hidden');
                setTimeout(() => {
                    rotateScreen.style.display = 'none';
                    startLoading();
                }, 500);
            }
            if (gl) resizeCanvas();
        });

        window.addEventListener('orientationchange', () => {
            setTimeout(checkOrientation, 300);
        });

        // ===== 2. IMAGE LOADING WITH CACHE =====
        async function startLoading() {
            loadingScreen.classList.add('active');

            // Try cache first
            let blob = await getFromCache(IMAGE_URL);
            if (!blob) {
                blob = await fetchWithProgress(IMAGE_URL);
                if (blob) await saveToCache(IMAGE_URL, blob);
            } else {
                // Simulate loading for cached image
                animateLoadingBar(100, 400);
            }

            if (blob) {
                const imgURL = URL.createObjectURL(blob);
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    imageLoaded = true;
                    URL.revokeObjectURL(imgURL);
                    onImageReady(img);
                };
                img.onerror = () => {
                    loadingPercent.textContent = 'Error loading image';
                };
                img.src = imgURL;
            }
        }

        async function getFromCache(url) {
            try {
                if (!('caches' in window)) return null;
                const cache = await caches.open(CACHE_NAME);
                const response = await cache.match(url);
                if (response) {
                    console.log('Loaded from cache');
                    return await response.blob();
                }
            } catch (e) {
                console.warn('Cache read failed', e);
            }
            return null;
        }

        async function saveToCache(url, blob) {
            try {
                if (!('caches' in window)) return;
                const cache = await caches.open(CACHE_NAME);
                const response = new Response(blob);
                await cache.put(url, response);
                console.log('Saved to cache');
            } catch (e) {
                console.warn('Cache write failed', e);
            }
        }

        async function fetchWithProgress(url) {
            try {
                const response = await fetch(url, { mode: 'cors' });
                if (!response.ok) throw new Error('Fetch failed');

                const contentLength = response.headers.get('content-length');
                if (!contentLength) {
                    // No content-length; just download and fake progress
                    animateLoadingBar(90, 2000);
                    const blob = await response.blob();
                    animateLoadingBar(100, 200);
                    return blob;
                }

                const total = parseInt(contentLength, 10);
                const reader = response.body.getReader();
                let received = 0;
                const chunks = [];

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    received += value.length;
                    const pct = Math.min(Math.round((received / total) * 100), 100);
                    loadingBar.style.width = pct + '%';
                    loadingPercent.textContent = pct + '%';
                }

                const blob = new Blob(chunks);
                loadingBar.style.width = '100%';
                loadingPercent.textContent = '100%';
                return blob;

            } catch (e) {
                console.error('Fetch error:', e);
                // Fallback: direct image load
                loadingPercent.textContent = 'Downloading...';
                animateLoadingBar(100, 3000);
                return new Promise((resolve) => {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        canvas.getContext('2d').drawImage(img, 0, 0);
                        canvas.toBlob(resolve, 'image/jpeg', 0.95);
                    };
                    img.onerror = () => resolve(null);
                    img.src = url;
                });
            }
        }

        function animateLoadingBar(targetPct, duration) {
            const start = parseFloat(loadingBar.style.width) || 0;
            const startTime = performance.now();
            function tick(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const current = start + (targetPct - start) * progress;
                loadingBar.style.width = current + '%';
                loadingPercent.textContent = Math.round(current) + '%';
                if (progress < 1) requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);
        }

        // ===== 3. WEBGL 360° RENDERING =====
        function onImageReady(img) {
            setTimeout(() => {
                loadingScreen.classList.add('fade-out');
                setTimeout(() => {
                    loadingScreen.classList.remove('active');
                    loadingScreen.classList.remove('fade-out');
                    initWebGL(img);
                    vrCanvas.classList.add('active');
                    vrUI.classList.add('active');
                    if (isMobile) promptGyro();
                    checkWebXR();
                    render();
                }, 800);
            }, 500);
        }

        function resizeCanvas() {
            vrCanvas.width = window.innerWidth * window.devicePixelRatio;
            vrCanvas.height = window.innerHeight * window.devicePixelRatio;
            vrCanvas.style.width = window.innerWidth + 'px';
            vrCanvas.style.height = window.innerHeight + 'px';
        }

        function initWebGL(img) {
            gl = vrCanvas.getContext('webgl', { xrCompatible: true, antialias: true }) ||
                 vrCanvas.getContext('experimental-webgl');
            if (!gl) {
                alert('WebGL not supported');
                return;
            }

            resizeCanvas();

            // Shaders
            const vsSource = `
                attribute vec3 aPosition;
                uniform mat4 uProjection;
                uniform mat4 uView;
                varying vec3 vDir;
                void main() {
                    vDir = aPosition;
                    gl_Position = uProjection * uView * vec4(aPosition, 1.0);
                }
            `;

            const fsSource = `
                precision mediump float;
                varying vec3 vDir;
                uniform sampler2D uTexture;
                #define PI 3.14159265359
                void main() {
                    vec3 dir = normalize(vDir);
                    float u = 0.5 + atan(dir.z, dir.x) / (2.0 * PI);
                    float v = 0.5 - asin(dir.y) / PI;
                    gl_FragColor = texture2D(uTexture, vec2(u, v));
                }
            `;

            const vs = compileShader(gl, gl.VERTEX_SHADER, vsSource);
            const fs = compileShader(gl, gl.FRAGMENT_SHADER, fsSource);
            shaderProgram = gl.createProgram();
            gl.attachShader(shaderProgram, vs);
            gl.attachShader(shaderProgram, fs);
            gl.linkProgram(shaderProgram);
            gl.useProgram(shaderProgram);

            // Sphere geometry
            const sphere = createSphere(50, 50);
            const posBuf = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(sphere.vertices), gl.STATIC_DRAW);

            const idxBuf = gl.createBuffer();
            gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, idxBuf);
            gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(sphere.indices), gl.STATIC_DRAW);

            const aPos = gl.getAttribLocation(shaderProgram, 'aPosition');
            gl.enableVertexAttribArray(aPos);
            gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);

            // Texture
            texture = gl.createTexture();
            gl.bindTexture(gl.TEXTURE_2D, texture);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);

            gl.enable(gl.DEPTH_TEST);

            window.sphereIndexCount = sphere.indices.length;
            setupControls();
        }

        function compileShader(gl, type, src) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, src);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        function createSphere(latBands, lonBands) {
            const vertices = [];
            const indices = [];
            for (let lat = 0; lat <= latBands; lat++) {
                const theta = lat * Math.PI / latBands;
                const sinT = Math.sin(theta);
                const cosT = Math.cos(theta);
                for (let lon = 0; lon <= lonBands; lon++) {
                    const phi = lon * 2 * Math.PI / lonBands;
                    const x = Math.cos(phi) * sinT;
                    const y = cosT;
                    const z = Math.sin(phi) * sinT;
                    vertices.push(x, y, z);
                }
            }
            for (let lat = 0; lat < latBands; lat++) {
                for (let lon = 0; lon < lonBands; lon++) {
                    const first = lat * (lonBands + 1) + lon;
                    const second = first + lonBands + 1;
                    indices.push(first, second, first + 1);
                    indices.push(second, second + 1, first + 1);
                }
            }
            return { vertices, indices };
        }

        // ===== MATRIX MATH =====
        function mat4Perspective(fov, aspect, near, far) {
            const f = 1.0 / Math.tan(fov / 2);
            const nf = 1 / (near - far);
            return new Float32Array([
                f / aspect, 0, 0, 0,
                0, f, 0, 0,
                0, 0, (far + near) * nf, -1,
                0, 0, 2 * far * near * nf, 0
            ]);
        }

        function mat4LookDir(yaw, pitch) {
            const cy = Math.cos(yaw), sy = Math.sin(yaw);
            const cp = Math.cos(pitch), sp = Math.sin(pitch);
            // View matrix for looking in direction defined by yaw/pitch
            return new Float32Array([
                cy, sy * sp, -sy * cp, 0,
                0, cp, sp, 0,
                sy, -cy * sp, cy * cp, 0,
                0, 0, 0, 1
            ]);
        }

        // ===== RENDER =====
        function renderEye(x, y, w, h, yawOffset) {
            gl.viewport(x, y, w, h);
            const aspect = w / h;
            const fov = isStereo ? 1.5 : 1.4; // ~80-86 degrees
            const projection = mat4Perspective(fov, aspect, 0.1, 100.0);
            const view = mat4LookDir(camYaw + yawOffset, camPitch);

            const uProj = gl.getUniformLocation(shaderProgram, 'uProjection');
            const uView = gl.getUniformLocation(shaderProgram, 'uView');
            gl.uniformMatrix4fv(uProj, false, projection);
            gl.uniformMatrix4fv(uView, false, view);

            gl.drawElements(gl.TRIANGLES, window.sphereIndexCount, gl.UNSIGNED_SHORT, 0);
        }

        function render() {
            if (isVRSession) return; // WebXR handles its own loop

            if (!gl) { requestAnimationFrame(render); return; }

            // Smooth camera
            camYaw += (targetYaw - camYaw) * 0.15;
            camPitch += (targetPitch - camPitch) * 0.15;

            const w = vrCanvas.width;
            const h = vrCanvas.height;

            gl.clearColor(0, 0, 0, 1);
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

            if (isStereo) {
                // Left eye
                renderEye(0, 0, w / 2, h, 0.03);
                // Right eye
                renderEye(w / 2, 0, w / 2, h, -0.03);
            } else {
                renderEye(0, 0, w, h, 0);
            }

            requestAnimationFrame(render);
        }

        // ===== CONTROLS =====
        function setupControls() {
            // Touch
            vrCanvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isDragging = true;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            }, { passive: false });

            vrCanvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!isDragging || useGyro) return;
                const dx = e.touches[0].clientX - lastX;
                const dy = e.touches[0].clientY - lastY;
                targetYaw -= dx * 0.004;
                targetPitch += dy * 0.004;
                targetPitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, targetPitch));
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            }, { passive: false });

            vrCanvas.addEventListener('touchend', () => isDragging = false);

            // Mouse
            vrCanvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                lastX = e.clientX;
                lastY = e.clientY;
                vrCanvas.style.cursor = 'grabbing';
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - lastX;
                const dy = e.clientY - lastY;
                targetYaw -= dx * 0.003;
                targetPitch += dy * 0.003;
                targetPitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, targetPitch));
                lastX = e.clientX;
                lastY = e.clientY;
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
                vrCanvas.style.cursor = 'grab';
            });

            vrCanvas.style.cursor = 'grab';
        }

        // ===== GYROSCOPE =====
        function promptGyro() {
            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS 13+
                gyroPrompt.classList.add('active');
            } else if ('DeviceOrientationEvent' in window) {
                // Android / other
                enableGyro();
            }
        }

        gyroAllowBtn.addEventListener('click', async () => {
            try {
                const perm = await DeviceOrientationEvent.requestPermission();
                if (perm === 'granted') enableGyro();
            } catch (e) { console.warn(e); }
            gyroPrompt.classList.remove('active');
        });

        gyroSkipBtn.addEventListener('click', () => {
            gyroPrompt.classList.remove('active');
        });

        function enableGyro() {
            useGyro = true;
            window.addEventListener('deviceorientation', (e) => {
                if (!e.alpha && !e.beta && !e.gamma) return;
                gyroAlpha = (e.alpha || 0) * Math.PI / 180;
                gyroBeta = (e.beta || 0) * Math.PI / 180;
                gyroGamma = (e.gamma || 0) * Math.PI / 180;

                // Convert device orientation to camera look direction
                // Landscape mode: gamma controls yaw, beta controls pitch
                const orientation = screen.orientation ? screen.orientation.angle : (window.orientation || 0);

                if (orientation === 90 || orientation === -90) {
                    targetYaw = -gyroAlpha;
                    targetPitch = -gyroGamma;
                } else {
                    targetYaw = -gyroAlpha;
                    targetPitch = gyroBeta - Math.PI / 2;
                }

                targetPitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, targetPitch));
            }, true);
        }

        // ===== STEREO TOGGLE =====
        stereoBtn.addEventListener('click', () => {
            isStereo = !isStereo;
            stereoBtn.textContent = isStereo ? '👁 Mono' : '👓 Stereo VR';

            if (isStereo) requestFullscreen();
        });

        // ===== FULLSCREEN =====
        fullscreenBtn.addEventListener('click', requestFullscreen);

        function requestFullscreen() {
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.msRequestFullscreen) el.msRequestFullscreen();

            // Lock orientation
            try {
                screen.orientation.lock('landscape').catch(() => {});
            } catch (e) {}
        }

        // ===== WEBXR =====
        async function checkWebXR() {
            if (!navigator.xr) return;
            try {
                const supported = await navigator.xr.isSessionSupported('immersive-vr');
                if (supported) {
                    enterVRBtn.style.display = 'block';
                }
            } catch (e) {}
        }

        enterVRBtn.addEventListener('click', startWebXR);

        async function startWebXR() {
            if (!navigator.xr) return;
            try {
                xrSession = await navigator.xr.requestSession('immersive-vr', {
                    requiredFeatures: ['local-floor']
                });

                isVRSession = true;
                vrUI.classList.remove('active');

                const xrGLLayer = new XRWebGLLayer(xrSession, gl);
                xrSession.updateRenderState({ baseLayer: xrGLLayer });

                xrRefSpace = await xrSession.requestReferenceSpace('local-floor');
                xrSession.requestAnimationFrame(onXRFrame);

                xrSession.addEventListener('end', () => {
                    isVRSession = false;
                    xrSession = null;
                    vrUI.classList.add('active');
                    resizeCanvas();
                    render();
                });

            } catch (e) {
                console.error('WebXR error:', e);
            }
        }

        function onXRFrame(time, frame) {
            if (!xrSession) return;
            xrSession.requestAnimationFrame(onXRFrame);

            const glLayer = xrSession.renderState.baseLayer;
            gl.bindFramebuffer(gl.FRAMEBUFFER, glLayer.framebuffer);
            gl.clearColor(0, 0, 0, 1);
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

            const pose = frame.getViewerPose(xrRefSpace);
            if (!pose) return;

            for (const view of pose.views) {
                const viewport = glLayer.getViewport(view);
                gl.viewport(viewport.x, viewport.y, viewport.width, viewport.height);

                const uProj = gl.getUniformLocation(shaderProgram, 'uProjection');
                const uView = gl.getUniformLocation(shaderProgram, 'uView');
                gl.uniformMatrix4fv(uProj, false, view.projectionMatrix);

                // Use inverse of view transform for looking inward at sphere
                const viewMat = view.transform.inverse.matrix;
                // Extract rotation only (no translation for 360)
                const rotOnly = new Float32Array(viewMat);
                rotOnly[12] = 0;
                rotOnly[13] = 0;
                rotOnly[14] = 0;

                gl.uniformMatrix4fv(uView, false, rotOnly);
                gl.drawElements(gl.TRIANGLES, window.sphereIndexCount, gl.UNSIGNED_SHORT, 0);
            }
        }

        // ===== INIT =====
        checkOrientation();

        // Desktop auto-start
        if (!isMobile) {
            // Already handled in checkOrientation
        }
    </script>
</body>
</html>
